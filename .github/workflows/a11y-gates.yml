      run: npx playwright test tests/a11y/keyboard-access.spec.ts
      env:
        CI: true

    - name: Upload keyboard test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: keyboard-access-results
        path: test-results/

  reduced-motion:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
