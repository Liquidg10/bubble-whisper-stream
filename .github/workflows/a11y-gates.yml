    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run reduced motion tests
      run: npx playwright test tests/a11y/reduced-motion.spec.ts
      env:
        CI: true

    - name: Upload motion test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: reduced-motion-results
        path: test-results/