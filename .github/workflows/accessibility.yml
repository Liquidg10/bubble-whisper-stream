name: Accessibility Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  accessibility-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        
      - name: Run accessibility tests
        run: |
          npx playwright test --grep="@a11y" --reporter=json > a11y-results.json
          npx playwright test tests/a11y/ --reporter=html
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4173
          
      - name: Validate DevA11yGate compliance
        run: |
          # Test DevA11yGate page directly
          npx playwright test -c playwright.config.ts --grep="DevA11yGate" --reporter=json > dev-a11y-gate.json
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4173
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-test-results
          path: |
            test-results/
            playwright-report/
            
      - name: Comment on PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && failure()
        with:
          script: |
            const fs = require('fs');
            
            // Parse a11y results
            let results = {};
            try {
              results = JSON.parse(fs.readFileSync('a11y-results.json', 'utf8'));
            } catch (e) {
              console.log('Could not read a11y results');
            }
            
            let comment = '## ❌ Accessibility Tests Failed\n\n';
            comment += 'WCAG 2.2 compliance violations detected. All issues must be resolved before deployment.\n\n';
            comment += '### Critical Requirements (P11 - A11y CI Gates):\n';
            comment += '- 🎯 **Target Size (SC 2.5.8)**: All interactive elements ≥44×44 CSS pixels\n';
            comment += '- ⌨️  **Keyboard Access**: Full keyboard navigation for all features\n';
            comment += '- 🎨 **Color Contrast (SC 1.4.3)**: WCAG AA standards (4.5:1 normal, 3:1 large)\n';
            comment += '- 🎬 **Reduced Motion (SC 2.3.3)**: Respect `prefers-reduced-motion` preference\n';
            comment += '- 📖 **Screen Reader**: All content navigable via assistive technology\n';
            comment += '- 🖱️ **Drag Alternatives (SC 2.5.7)**: Keyboard alternatives for all drag operations\n\n';
            comment += '### DevA11yGate Integration:\n';
            comment += 'This CI check enforces the same standards as `/dev/a11y-gate` - fix violations there first.\n\n';
            comment += '📊 [View detailed test results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n';
            comment += '🔧 **Local Debug**: `npm run test:a11y` or visit `/dev/a11y-gate`';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Separate job for performance testing of a11y features
  a11y-performance:
    runs-on: ubuntu-latest
    needs: accessibility-tests
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        
      - name: Run performance tests for accessibility features
        run: |
          npx playwright test tests/a11y/performance-accessibility.spec.ts --reporter=json > a11y-performance.json
          
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-performance-results
          path: a11y-performance.json