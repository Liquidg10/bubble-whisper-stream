name: Accessibility Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  accessibility-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        
      - name: Run accessibility tests
        run: npx playwright test --grep="@a11y" --reporter=html
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4173
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-test-results
          path: |
            test-results/
            playwright-report/
            
      - name: Comment on PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && failure()
        with:
          script: |
            const fs = require('fs');
            
            // Read test results if they exist
            let comment = '## ❌ Accessibility Tests Failed\n\n';
            comment += 'The accessibility tests have failed. Please review the uploaded test results and fix the following issues:\n\n';
            comment += '### Required Fixes:\n';
            comment += '- ✅ All interactive elements must be ≥44×44px\n';
            comment += '- ✅ Keyboard navigation must work for all features\n';
            comment += '- ✅ WCAG AA color contrast standards must be met\n';
            comment += '- ✅ Animations respect `prefers-reduced-motion` preference\n';
            comment += '- ✅ Screen readers must be able to navigate content\n';
            comment += '- ✅ Drag-and-drop features must have keyboard alternatives\n\n';
            comment += '📊 [View detailed test results in the artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n';
            comment += '💡 Run `npm run test:a11y` locally to debug accessibility issues.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Separate job for performance testing of a11y features
  a11y-performance:
    runs-on: ubuntu-latest
    needs: accessibility-tests
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        
      - name: Run performance tests for accessibility features
        run: |
          npx playwright test tests/a11y/performance-accessibility.spec.ts --reporter=json > a11y-performance.json
          
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-performance-results
          path: a11y-performance.json