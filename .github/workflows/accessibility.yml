name: Accessibility & Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  accessibility-gates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Assistant Cohesion Lint (P18)
      run: node scripts/lint-assistant-cohesion.js
      
    - name: Run TypeScript check
      run: npx tsc --noEmit
      
    - name: Run ESLint
      run: npx eslint .
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run A11y Acceptance Tests (P11)
      run: npx playwright test tests/a11y/ --reporter=junit
      
    - name: Upload A11y Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: a11y-test-results
        path: test-results/
        
    - name: Run OAuth Incremental Auth Tests (P10)
      run: npx playwright test tests/oauth/ --reporter=junit
      
    - name: Run A11y Gate Script (P11)
      run: node scripts/run-a11y-gate.js
    
    # TODO P20: Add E2E verification gates
    # - name: Run E2E Gates
    #   run: npm run test:e2e-gates